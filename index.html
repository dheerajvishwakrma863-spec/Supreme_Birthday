<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SINGULARITY | DHEERAJ VISHWAKARMA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=JetBrains+Mono:wght@300&family=Orbitron:wght@900&display=swap');
        
        :root { --neon: #00f2ff; --magenta: #ff0077; --bg: #020202; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'JetBrains Mono', monospace; color: white; }
        
        /* ADVANCED NEURAL HUD */
        #hud { position: fixed; inset: 0; z-index: 100; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 25px; box-sizing: border-box; }
        .hud-row { display: flex; justify-content: space-between; width: 100%; }
        .stat-card { border-left: 2px solid var(--neon); padding-left: 12px; background: rgba(0,242,255,0.03); backdrop-filter: blur(10px); border-radius: 0 10px 10px 0; }
        .label { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: var(--neon); opacity: 0.8; }
        .value { font-size: 14px; font-family: 'Orbitron'; color: #fff; text-shadow: 0 0 10px var(--neon); }

        .core-portal { pointer-events: auto; text-align: center; margin: auto; position: relative; z-index: 110; }
        h1 { font-family: 'Orbitron'; font-weight: 900; font-size: clamp(2.5rem, 12vw, 7rem); margin: 0; background: linear-gradient(180deg, #fff 20%, var(--neon) 80%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 40px rgba(0,242,255,0.6)); letter-spacing: -4px; line-height: 0.85; }
        
        #ai-status-log { margin-top: 25px; font-size: 12px; color: var(--magenta); text-transform: uppercase; letter-spacing: 2px; height: 20px; text-shadow: 0 0 8px var(--magenta); font-weight: bold; }
        
        .ignite-btn { pointer-events: auto; margin-top: 50px; padding: 22px 55px; background: transparent; border: 1px solid var(--neon); color: var(--neon); font-family: 'Syncopate'; cursor: pointer; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); text-transform: uppercase; letter-spacing: 6px; font-size: 12px; position: relative; overflow: hidden; }
        .ignite-btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 60px var(--neon); transform: scale(1.1) translateY(-5px); }

        /* SCANLINE & FX */
        .scanlines { position: fixed; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 200; background-size: 100% 2px, 3px 100%; pointer-events: none; }
        canvas { display: block; position: fixed; inset: 0; z-index: 1; }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <div id="hud">
        <div class="hud-row">
            <div class="stat-card">
                <div class="label">Hardware Energy</div>
                <div class="value" id="bat-stat">SYNCING...</div>
            </div>
            <div class="stat-card" style="text-align: right; border-left: none; border-right: 2px solid var(--magenta); padding: 0 12px 0 0;">
                <div class="label">Spatial Coordinates</div>
                <div class="value" id="geo-stat">FETCHING...</div>
            </div>
        </div>

        <div class="core-portal">
            <h1 id="user-name">DHEERAJ</h1>
            <div id="ai-status-log">SYSTEM_IDLE: BIOMETRIC_WAIT</div>
            <button class="ignite-btn" onclick="MASTER_START()">Initialize Supreme Link</button>
        </div>

        <div class="hud-row">
            <div class="stat-card">
                <div class="label">Neural Complexity</div>
                <div class="value">150,000 NODES</div>
            </div>
            <div class="stat-card" style="text-align: right; border-left: none; border-right: 2px solid var(--neon); padding: 0 12px 0 0;">
                <div class="label">AI Consciousness</div>
                <div class="value">SUPREME_v5.0</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, particles, analyzer, voiceRec;
        const P_COUNT = 150000; 
        const clock = new THREE.Clock();

        // 1. HARDWARE DATA (Real-time Sensors)
        if(navigator.getBattery) {
            navigator.getBattery().then(b => {
                document.getElementById('bat-stat').innerText = `${Math.round(b.level * 100)}% | ${b.charging ? 'PLUGGED' : 'BATT'}`;
            });
        }
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('geo-stat').innerText = `${p.coords.latitude.toFixed(2)}°N ${p.coords.longitude.toFixed(2)}°E`;
        }, () => { document.getElementById('geo-stat').innerText = "LOCATION_LOCKED"; });

        // 2. THE IGNITION SEQUENCE
        function MASTER_START() {
            document.querySelector('.ignite-btn').style.display = 'none';
            document.getElementById('ai-status-log').innerText = "SYNCHRONIZING NEURAL CORE...";
            
            init3D();
            initNodes();
            initAudio();
            initVoiceSystem();
            animateLoop();
            
            // AI Greetings
            speak("Welcome back, Master Dheeraj. Neural link is active. Accessing your birthday universe.");
        }

        // 3. 3D ENGINE SETUP
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
            camera.position.z = 180;

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
        }

        // 4. NEURAL NODES GENERATOR
        function initNodes() {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(P_COUNT * 3);
            const cols = new Float32Array(P_COUNT * 3);

            for(let i=0; i<P_COUNT*3; i+=3) {
                const r = 130 + Math.random() * 40;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                pos[i] = r * Math.sin(phi) * Math.cos(theta);
                pos[i+1] = r * Math.sin(phi) * Math.sin(theta);
                pos[i+2] = r * Math.cos(phi);

                cols[i] = 0.0; 
                cols[i+1] = Math.random();
                cols[i+2] = 1.0;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));

            const mat = new THREE.PointsMaterial({
                size: 0.1, vertexColors: true, transparent: true, opacity: 0.6,
                blending: THREE.AdditiveBlending
            });

            particles = new THREE.Points(geo, mat);
            scene.add(particles);
        }

        // 5. AUDIO SYNC (Using your song name)
        function initAudio() {
            const listener = new THREE.AudioListener();
            camera.add(listener);
            const sound = new THREE.Audio(listener);
            const loader = new THREE.AudioLoader();
            
            // Bhai, apne gaane ka naam 'birthday_song.mp3' hi rakhna.
            loader.load('birthday_song.mp3', (b) => {
                sound.setBuffer(b);
                sound.setLoop(true);
                sound.play();
                analyzer = new THREE.AudioAnalyser(sound, 32);
            });
        }

        // 6. AI CONSCIOUSNESS (Voice & Commands)
        function speak(t) {
            const m = new SpeechSynthesisUtterance(t);
            m.pitch = 0.6; m.rate = 0.9;
            window.speechSynthesis.speak(m);
            document.getElementById('ai-status-log').innerText = "AI: " + t.toUpperCase();
        }

        function initVoiceSystem() {
            const Rec = window.webkitSpeechRecognition || window.SpeechRecognition;
            if(!Rec) return;
            voiceRec = new Rec();
            voiceRec.continuous = true;
            voiceRec.onresult = (e) => {
                const cmd = e.results[e.results.length-1][0].transcript.toLowerCase();
                if(cmd.includes("warp")) {
                    gsap.to(camera.position, {z: 40, duration: 2, ease: "power4.inOut"});
                    speak("Warp drive initiated.");
                }
                if(cmd.includes("stabilize")) {
                    gsap.to(camera.position, {z: 180, duration: 2});
                    speak("System stabilized.");
                }
            };
            voiceRec.start();
        }

        // 7. RENDER & PHYSICS LOOP
        function animateLoop() {
            requestAnimationFrame(animateLoop);
            const dt = clock.getElapsedTime();
            
            const freq = analyzer ? analyzer.getAverageFrequency() : 0;
            particles.scale.setScalar(1 + freq/180);
            
            // Neural Turbulence
            const p = particles.geometry.attributes.position.array;
            for(let i=0; i<p.length; i+=3) {
                p[i+1] += Math.sin(dt + p[i]*0.02) * 0.08;
            }
            particles.geometry.attributes.position.needsUpdate = true;
            
            particles.rotation.y += 0.001 + (freq/4000);
            renderer.render(scene, camera);
        }

        // 8. INTERACTION & GYRO
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 60;
            const y = (e.clientY / window.innerHeight - 0.5) * 60;
            gsap.to(camera.position, {x: x, y: -y, duration: 1.5});
        });

        window.addEventListener('deviceorientation', (e) => {
            particles.rotation.x = e.beta * 0.015;
            particles.rotation.y = e.gamma * 0.015;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
