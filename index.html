<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INFINITY_CELEBRATION_V20</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Playfair+Display:ital,wght@0,700;1,700&family=Dancing+Script:wght@700&family=Orbitron:wght@600&display=swap');
        
        :root { --neon: #00f2ff; --gold: #ffd700; --bg: #030303; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; color: white; transition: background 2s; }
        
        /* TOP HUD STATUS */
        #hud-top { position: fixed; top: 0; width: 100%; padding: 15px 25px; display: flex; justify-content: space-between; z-index: 1000; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); font-size: 9px; letter-spacing: 3px; box-sizing: border-box; }
        .status-pill { border: 1px solid var(--neon); padding: 4px 10px; border-radius: 20px; color: var(--neon); box-shadow: 0 0 10px rgba(0,242,255,0.2); }

        /* MULTI-PHASE LAYERS */
        .layer { position: fixed; inset: 0; z-index: 500; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.92); backdrop-filter: blur(25px); transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 40px 30px; border-radius: 40px; text-align: center; width: 85%; max-width: 380px; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        
        /* INPUTS & BUTTONS */
        .smart-input { width: 100%; padding: 16px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 15px; margin-bottom: 20px; outline: none; transition: 0.3s; font-family: inherit; }
        .smart-input:focus { border-color: var(--neon); box-shadow: 0 0 15px rgba(0,242,255,0.2); }
        
        .prime-btn { width: 100%; padding: 20px; background: var(--neon); color: #000; border: none; border-radius: 50px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.4s; letter-spacing: 2px; }
        .prime-btn:active { transform: scale(0.95); }

        /* MUSIC PLAYER DOCK */
        #music-bar { position: fixed; bottom: 30px; width: 100%; display: none; justify-content: center; z-index: 1000; }
        .dock { background: rgba(255,255,255,0.05); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); padding: 12px 30px; border-radius: 50px; display: flex; align-items: center; gap: 20px; }

        /* SYSTEM ANIMATIONS */
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-3px, -1px); } 100% { transform: translate(0, 0); } }

        canvas { display: block; position: fixed; inset: 0; z-index: 1; }
        #final-msg { display: none; position: fixed; z-index: 600; text-align: center; width: 100%; top: 35%; pointer-events: none; }
    </style>
</head>
<body>

    <div id="hud-top">
        <span id="sys-mode">CORE: STANDBY</span>
        <span class="status-pill" id="batt-lv">BATT: SCANNING...</span>
    </div>

    <div id="phase1" class="layer">
        <div class="glass-box">
            <h1 style="font-family: 'Orbitron'; font-size: 1.1rem; color: var(--neon); margin-bottom: 10px;">IDENTITY_SYNC_v2.0</h1>
            <p style="font-size: 10px; opacity: 0.6; margin-bottom: 25px;">Hold the button to synchronize your profile</p>
            <input type="text" id="uName" class="smart-input" placeholder="SUBJECT NAME">
            <input type="file" id="uPics" class="smart-input" multiple accept="image/*">
            <button class="prime-btn" id="loginBtn" onmousedown="startBoot()" onmouseup="stopBoot()" ontouchstart="startBoot()" ontouchend="stopBoot()">INITIATE SYNC</button>
            <div id="boot-progress" style="width:0%; height:4px; background:var(--neon); margin-top:15px; border-radius:10px; transition:0.1s;"></div>
        </div>
    </div>

    <div id="phase4" class="layer" style="display: none; opacity: 0;">
        <div class="glass-box">
            <h1 style="color: var(--gold);">Bond Evaluation</h1>
            <p style="font-size: 11px; opacity: 0.7; margin-bottom: 20px;">AI is calculating the neural strength of your bond.</p>
            <textarea id="uPlan" class="smart-input" style="height: 100px; resize: none;" placeholder="Write your plan for this relationship..."></textarea>
            <button class="prime-btn" onclick="runAnalysis()">CALCULATE SCORE</button>
        </div>
    </div>

    <div id="final-msg">
        <div id="score-badge" style="background:rgba(0,255,0,0.1); color:#0f0; border:1px solid #0f0; padding:5px 15px; border-radius:20px; display:inline-block; font-size:10px; margin-bottom:15px;"></div>
        <h2 id="wish-title" style="font-family: 'Dancing Script'; font-size: 4rem; color: var(--gold); margin: 0;">Happy Birthday!</h2>
        <p id="wish-sub" style="font-style: italic; opacity: 0.9;"></p>
    </div>

    <div id="music-bar">
        <div class="dock">
            <span onclick="toggleMusic()" style="cursor:pointer; font-size:20px;">⏯️</span>
            <input type="range" min="0" max="1" step="0.1" onchange="setVol(this.value)" style="width:70px;">
            <span style="font-size:9px; letter-spacing:1px; opacity:0.7;">BEACH_SESSION.SYS</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, sound, analyzer;
        let objects = { ball:[], frag:[], lant:[], pic:[] }, textures = [], bootTimer, userName = "";

        // BATTERY SENSE LOGIC
        if(navigator.getBattery) {
            navigator.getBattery().then(b => {
                const update = () => {
                    let lv = Math.round(b.level * 100);
                    document.getElementById('batt-lv').innerText = `BATT: ${lv}%`;
                    if(lv < 30) document.body.style.filter = "contrast(0.9) brightness(0.8)";
                };
                update(); b.onlevelchange = update;
            });
        }

        // PHASE 1: BOOTING
        function startBoot() {
            let p = 0;
            bootTimer = setInterval(() => {
                p += 4;
                document.getElementById('boot-progress').style.width = p + "%";
                if(p >= 100) { clearInterval(bootTimer); executePhase2(); }
            }, 50);
        }
        function stopBoot() { clearInterval(bootTimer); document.getElementById('boot-progress').style.width = "0%"; }

        async function executePhase2() {
            userName = document.getElementById('uName').value || "Beloved";
            const files = document.getElementById('uPics').files;
            if(files.length > 0) {
                for(let f of files) {
                    const d = await new Promise(r => { const rd = new FileReader(); rd.onload = e => r(e.target.result); rd.readAsDataURL(f); });
                    textures.push(new THREE.TextureLoader().load(d));
                }
            }

            gsap.to("#phase1", { y: -1000, opacity: 0, duration: 1.2, onComplete: () => {
                document.getElementById('phase1').style.display = 'none';
                init3D();
                startPerformance();
            }});
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 220;
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            animate();
        }

        // PHASE 2: BALLOONS PERFORMANCE
        function startPerformance() {
            document.getElementById('sys-mode').innerText = "CORE: PERFORMANCE";
            document.body.style.background = "linear-gradient(to top, #001f3f, #000)";
            
            const geo = new THREE.SphereGeometry(5, 12, 12);
            for(let i=0; i<45; i++) {
                const m = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: Math.random()*0xffffff }));
                m.position.set((Math.random()-0.5)*350, -250, (Math.random()-0.5)*150);
                objects.ball.push(m); scene.add(m);
            }
            setTimeout(startChallenge, 5000);
        }

        // PHASE 3: NEURAL CHALLENGE GAME
        function startChallenge() {
            document.getElementById('sys-mode').innerText = "CORE: CHALLENGE";
            objects.ball.forEach(b => scene.remove(b));
            
            const fGeo = new THREE.IcosahedronGeometry(8, 0);
            for(let i=0; i<8; i++) {
                const m = new THREE.Mesh(fGeo, new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true }));
                m.position.set((Math.random()-0.5)*300, (Math.random()-0.5)*300, (Math.random()-0.5)*100);
                objects.frag.push(m); scene.add(m);
            }
        }

        window.addEventListener('mousedown', (e) => {
            if(objects.frag.length === 0) return;
            const ray = new THREE.Raycaster();
            const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
            ray.setFromCamera(mouse, camera);
            const hits = ray.intersectObjects(objects.frag);
            if(hits.length > 0) {
                scene.remove(hits[0].object);
                objects.frag = objects.frag.filter(f => f !== hits[0].object);
                document.body.classList.add('shake'); 
                setTimeout(() => document.body.classList.remove('shake'), 200);
                
                if(objects.frag.length === 0) {
                    document.getElementById('phase4').style.display = 'flex';
                    gsap.to("#phase4", { opacity: 1, duration: 1 });
                }
            }
        });

        // PHASE 4: BOND ANALYSIS GAME
        function runAnalysis() {
            const planText = document.getElementById('uPlan').value;
            const score = Math.min(85 + (planText.length/5), 99.9);
            
            gsap.to("#phase4", { opacity: 0, scale: 0.5, duration: 1, onComplete: () => {
                document.getElementById('phase4').style.display = 'none';
                startFinale(score);
            }});
        }

        // PHASE 5: GRAND FINALE
        function startFinale(s) {
            document.getElementById('sys-mode').innerText = "CORE: FINALE";
            document.body.style.background = "radial-gradient(circle, #00d2ff, #001f3f)";
            
            document.getElementById('score-badge').innerText = `BOND SCORE: ${Math.round(s)}%`;
            document.getElementById('wish-sub').innerText = `Welcome to your Maldives Paradise, ${userName}`;
            document.getElementById('final-msg').style.display = 'block';
            document.getElementById('music-bar').style.display = 'flex';
            
            initAudio();
            
            // Photo & Lantern Deployment
            textures.forEach(t => {
                const p = new THREE.Mesh(new THREE.PlaneGeometry(40, 50), new THREE.MeshBasicMaterial({map: t, side: 2}));
                p.position.set((Math.random()-0.5)*400, (Math.random()-0.5)*400, (Math.random()-0.5)*200);
                objects.pic.push(p); scene.add(p);
            });
            for(let i=0; i<85; i++) {
                const l = new THREE.Mesh(new THREE.CylinderGeometry(1.2,1,5), new THREE.MeshBasicMaterial({color: 0xffd700, transparent:true, opacity:0.5}));
                l.position.set((Math.random()-0.5)*600, (Math.random()-0.5)*600, (Math.random()-0.5)*400);
                objects.lant.push(l); scene.add(l);
            }

            window.speechSynthesis.speak(new SpeechSynthesisUtterance("System Analysis Complete. Happy Birthday " + userName + ". Enjoy your special day."));
        }

        function initAudio() {
            const listener = new THREE.AudioListener(); camera.add(listener);
            sound = new THREE.Audio(listener);
            new THREE.AudioLoader().load('birthday_song.mp3', (b) => {
                sound.setBuffer(b); sound.setLoop(true); sound.setVolume(0.7); sound.play();
                analyzer = new THREE.AudioAnalyser(sound, 32);
            });
        }

        function toggleMusic() { if(sound.isPlaying) sound.pause(); else sound.play(); }
        function setVol(v) { sound.setVolume(v); }

        function animate() {
            requestAnimationFrame(animate);
            const freq = analyzer ? analyzer.getAverageFrequency() : 0;
            
            objects.ball.forEach(b => { b.position.y += 0.7; if(b.position.y > 280) b.position.y = -280; });
            objects.frag.forEach(f => { f.rotation.y += 0.04; f.rotation.x += 0.02; });
            objects.lant.forEach(l => { 
                l.position.y += 0.35; l.material.opacity = 0.3 + (freq/140);
                if(l.position.y > 350) l.position.y = -350;
            });
            objects.pic.forEach(p => { p.position.y += 0.2; p.rotation.y += 0.01; if(p.position.y > 350) p.position.y = -350; });
            
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
