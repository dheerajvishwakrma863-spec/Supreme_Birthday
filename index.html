<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE_ULTIMATE_BOND_V16</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600&family=Playfair+Display:ital,wght@0,700;1,700&family=Dancing+Script:wght@700&family=Orbitron:wght@600&display=swap');
        
        :root { --neon: #00f2ff; --gold: #ffd700; --bg: #050505; --maldives: #00d2ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; color: white; transition: background 2s ease; }
        
        /* PREMIUM INTERFACE */
        .glass-ui { position: fixed; inset: 0; z-index: 500; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); transition: 1s ease; }
        .card { background: rgba(255,255,255,0.03); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 35px; text-align: center; width: 90%; max-width: 420px; box-shadow: 0 50px 100px rgba(0,0,0,0.9); }
        
        h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 25px; letter-spacing: 1px; color: var(--gold); }
        .input-box { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 12px; margin-bottom: 20px; outline: none; font-size: 14px; box-sizing: border-box; }
        textarea { height: 100px; resize: none; }
        
        .main-btn { width: 100%; padding: 18px; background: var(--neon); color: #000; border: none; border-radius: 50px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.4s; letter-spacing: 2px; }
        .main-btn:hover { box-shadow: 0 0 30px var(--neon); transform: translateY(-3px); }

        /* HUD & SCORE */
        #game-hud { position: fixed; top: 30px; width: 100%; text-align: center; z-index: 100; display: none; pointer-events: none; }
        .score-display { font-family: 'Orbitron'; font-size: 2.5rem; color: var(--neon); text-shadow: 0 0 15px var(--neon); }

        /* FINAL OVERLAY */
        #reveal-layer { display: none; position: fixed; inset: 0; z-index: 600; flex-direction: column; justify-content: center; align-items: center; text-align: center; pointer-events: none; }
        .bday-name { font-family: 'Dancing Script', cursive; font-size: 5rem; color: var(--gold); filter: drop-shadow(0 0 20px rgba(255,215,0,0.6)); margin: 0; }
        .bond-badge { background: rgba(0,255,0,0.1); border: 1px solid #0f0; padding: 10px 20px; border-radius: 50px; font-size: 12px; margin-bottom: 20px; color: #0f0; letter-spacing: 2px; }

        canvas { display: block; position: fixed; inset: 0; z-index: 1; }
    </style>
</head>
<body>

    <div id="ui-overlay" class="glass-ui">
        <div class="card" id="form-content">
            <h1>Memories of the Deep</h1>
            <p style="font-size: 10px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.6; margin-bottom: 25px;">Phase 1: Identity Sync</p>
            <input type="text" id="name" class="input-box" placeholder="SUBJECT_NAME">
            <input type="file" id="photos" class="input-box" multiple accept="image/*">
            <button class="main-btn" onclick="START_GAME()">INITIATE LINK</button>
        </div>

        <div class="card" id="score-content" style="display: none;">
            <h1>The Bond Evaluation</h1>
            <p style="font-size: 11px; opacity: 0.7; margin-bottom: 20px;">Write a few words about your future plan to make this bond stronger.</p>
            <textarea id="bond-plan" class="input-box" placeholder="Type your plan here..."></textarea>
            <button class="main-btn" onclick="CALCULATE_BOND()">SUBMIT PLAN</button>
        </div>
    </div>

    <div id="game-hud">
        <p style="font-size: 10px; letter-spacing: 5px;">COLLECT 8 NEURAL FRAGMENTS</p>
        <div class="score-display" id="count">0 / 8</div>
    </div>

    <div id="reveal-layer">
        <div id="final-score-badge" class="bond-badge">BOND_SCORE: 0%</div>
        <h2 id="display-name" class="bday-name"></h2>
        <p id="final-wish" style="max-width: 80%; font-style: italic; line-height: 1.6;"></p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, fragments = [], lanterns = [], photos = [], analyzer;
        let score = 0, isGameActive = false, photoTextures = [];
        let userName = "";

        async function START_GAME() {
            userName = document.getElementById('name').value || "Beloved";
            const files = document.getElementById('photos').files;

            if(files.length > 0) {
                for(let f of files) {
                    const data = await new Promise(r => { const rd = new FileReader(); rd.onload = e => r(e.target.result); rd.readAsDataURL(f); });
                    photoTextures.push(new THREE.TextureLoader().load(data));
                }
            }

            gsap.to("#ui-overlay", { opacity: 0, duration: 1, onComplete: () => {
                document.getElementById('ui-overlay').style.display = 'none';
                init3DEngine();
                isGameActive = true;
                document.getElementById('game-hud').style.display = 'block';
            }});
        }

        function init3DEngine() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 200;
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Phase 2 Fragments (Indian Beach Vibes)
            const geo = new THREE.IcosahedronGeometry(7, 0);
            for(let i=0; i<8; i++) {
                const mat = new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set((Math.random()-0.5)*300, (Math.random()-0.5)*300, (Math.random()-0.5)*100);
                fragments.push(mesh); scene.add(mesh);
            }
            animate();
        }

        // Raycaster for Game
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        window.addEventListener('mousedown', (e) => {
            if(!isGameActive) return;
            mouse.x = (e.clientX/window.innerWidth)*2-1;
            mouse.y = -(e.clientY/window.innerHeight)*2+1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(fragments);
            if(hits.length > 0) {
                scene.remove(hits[0].object);
                fragments = fragments.filter(f => f !== hits[0].object);
                score++;
                document.getElementById('count').innerText = `${score} / 8`;
                if(score === 8) OPEN_BOND_CALCULATOR();
            }
        });

        function OPEN_BOND_CALCULATOR() {
            isGameActive = false;
            document.getElementById('game-hud').style.display = 'none';
            document.getElementById('ui-overlay').style.display = 'flex';
            document.getElementById('form-content').style.display = 'none';
            document.getElementById('score-content').style.display = 'block';
            gsap.to("#ui-overlay", { opacity: 1, duration: 1 });
        }

        function CALCULATE_BOND() {
            const plan = document.getElementById('bond-plan').value;
            // Logical Scoring based on word length and keywords
            let finalScore = Math.min(75 + (plan.length / 5), 99.9);
            if(plan.includes("love") || plan.includes("forever") || plan.includes("always")) finalScore += 5;
            
            document.getElementById('final-score-badge').innerText = `BOND_STRENGTH: ${Math.round(finalScore)}%`;

            gsap.to("#ui-overlay", { opacity: 0, duration: 1, onComplete: () => {
                document.getElementById('ui-overlay').style.display = 'none';
                FINAL_REVEAL();
            }});
        }

        function FINAL_REVEAL() {
            // Change Background to Foreign Beach (Turquoise)
            document.body.style.background = "radial-gradient(circle, #00d2ff, #001f3f)";
            
            createLanternsAndPhotos();
            initAudio();

            document.getElementById('reveal-layer').style.display = 'flex';
            document.getElementById('display-name').innerText = userName.toUpperCase();
            document.getElementById('final-wish').innerText = "A bond that's measured in percentages is only the beginning. Like the deep turquoise sea, your love has no end.";
            
            const speech = new SpeechSynthesisUtterance(`Analysis complete. Your bond score is impressive. Happy Birthday ${userName}.`);
            window.speechSynthesis.speak(speech);
        }

        function createLanternsAndPhotos() {
            const lGeo = new THREE.CylinderGeometry(1.5, 1, 5, 8);
            for(let i=0; i<100; i++) {
                const mat = new THREE.MeshBasicMaterial({color: 0xffd700, transparent: true, opacity: 0.6});
                const l = new THREE.Mesh(lGeo, mat);
                l.position.set((Math.random()-0.5)*600, (Math.random()-0.5)*600, (Math.random()-0.5)*400);
                l.userData = { speed: 0.3 + Math.random()*0.4 };
                lanterns.push(l); scene.add(l);
            }
            photoTextures.forEach(tex => {
                const p = new THREE.Mesh(new THREE.PlaneGeometry(35, 45), new THREE.MeshBasicMaterial({map: tex, side: THREE.DoubleSide}));
                p.position.set((Math.random()-0.5)*400, (Math.random()-0.5)*400, (Math.random()-0.5)*200);
                p.userData = { speed: 0.2 };
                photos.push(p); scene.add(p);
            });
        }

        function initAudio() {
            const listener = new THREE.AudioListener();
            camera.add(listener);
            const sound = new THREE.Audio(listener);
            new THREE.AudioLoader().load('birthday_song.mp3', (b) => {
                sound.setBuffer(b); sound.play();
                analyzer = new THREE.AudioAnalyser(sound, 32);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const freq = analyzer ? analyzer.getAverageFrequency() : 0;
            const time = Date.now() * 0.001;

            if(isGameActive) {
                fragments.forEach((f, i) => {
                    f.rotation.x += 0.02; f.rotation.y += 0.02;
                    f.position.y += Math.sin(time + i) * 0.5;
                });
            } else {
                lanterns.forEach(l => {
                    l.position.y += l.userData.speed;
                    l.material.opacity = 0.4 + (freq/150);
                    if(l.position.y > 350) l.position.y = -350;
                });
                photos.forEach(p => {
                    p.position.y += p.userData.speed;
                    p.rotation.y += 0.01;
                    if(p.position.y > 350) p.position.y = -350;
                });
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
